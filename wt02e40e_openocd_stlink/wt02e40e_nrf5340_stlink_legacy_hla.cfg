# WT02E40E / nRF5340 fallback OpenOCD config for older ST-Link HLA mode.
#
# Try wt02e40e_nrf5340_stlink_dap.cfg first.
# This legacy HLA path may not work with nRF53 target configs that need full DAP
# access. It is included only because some ST-Link V2 setups expose only HLA.

source [find interface/stlink.cfg]
transport select hla_swd

adapter speed 1000

source [find target/nordic/nrf53.cfg]

reset_config srst_only srst_nogate
