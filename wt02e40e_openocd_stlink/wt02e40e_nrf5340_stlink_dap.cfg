# WT02E40E / nRF5340 experimental OpenOCD config for ST-Link using DAP mode.
#
# This is the one to try first with a modern OpenOCD and modern ST-Link firmware.
# It requires OpenOCD to have target/nordic/nrf53.cfg. Many packaged OpenOCD
# builds still do not have solid nRF53 support.
#
# Wiring:
#   ST-Link GND    -> WT02E40E GND
#   ST-Link SWDIO  -> WT02E40E SWDIO_NRF
#   ST-Link SWCLK  -> WT02E40E SWCLK_NRF
#   ST-Link NRST   -> WT02E40E RESET_NRF
#   ST-Link VTref/3V3 sense -> WT02E40E VDD_NRF
#
# Power the WT02E40E from a real 3.3 V supply. Do not rely on an ST-Link clone's
# 3.3 V pin for Wi-Fi current.

source [find interface/stlink-dap.cfg]
transport select swd

# Start slow. Raise to 2000 or 4000 after the link is boring.
adapter speed 1000

# Needs an OpenOCD build with nRF53 support.
source [find target/nordic/nrf53.cfg]

reset_config srst_only srst_nogate
